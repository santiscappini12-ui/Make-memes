<script>
    const socket = io();

    function sendImage() {
        const url = document.getElementById('imgUrl').value;
        if(url) {
            socket.emit('set-meme-image', url);
        }
    }

    // Escuchamos el evento de mostrar
    socket.on('display-meme', (url) => {
        const container = document.getElementById('meme-container');
        if (url) {
            container.innerHTML = `<img src="${url}" style="max-width:500px; display:block;">`;
        }
    });
</script>
