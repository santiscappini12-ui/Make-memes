<!DOCTYPE html>
<html>
<body>
    <h1>Juego de Memes Sin Censura</h1>
    
    <div id="admin-panel">
        <input type="text" id="imgUrl" placeholder="Pega aquí la URL de la imagen">
        <button onclick="sendImage()">Enviar Imagen</button>
    </div>

    <div id="meme-container"></div>
    <div id="captions"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function sendImage() {
            const url = document.getElementById('imgUrl').value;
            socket.emit('set-meme-image', url);
        }

        socket.on('display-meme', (url) => {
            document.getElementById('meme-container').innerHTML = `<img src="${url}" style="max-width:500px;">`;
        });
    </script>
</body>
</html>
