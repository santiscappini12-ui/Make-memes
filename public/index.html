<!-- Admin: Input para subir archivo local -->
<input type="file" id="memeInput" accept="image/*">
<button onclick="uploadImage()">Subir Meme</button>

<script>
    function uploadImage() {
        const file = document.getElementById('memeInput').files[0];
        const reader = new FileReader();
        
        reader.onload = function(e) {
            // Enviamos el archivo como Base64 al servidor
            socket.emit('upload-meme', e.target.result);
        };
        reader.readAsDataURL(file);
    }

    // Jugadores: Reciben la imagen y la muestran
    socket.on('phase-start', (data) => {
        const img = new Image();
        img.src = data.image; // El base64 llega directo de la RAM
        document.body.appendChild(img);
    });
</script>
